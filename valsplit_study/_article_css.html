<style>
:root{
  --paper:#f3f4f6; --card:#ffffff; --ink:#161a22; --ink-soft:#3a4152;
  --muted:#697086; --line:#dfe3ea; --accent:#1f5fa8; --e1:#1f77b4; --e2:#c0392b;
  --pos:#1f8a55; --neg:#c0392b; --callout:#eef3fb;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --sans:ui-sans-serif,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SFMono-Regular",Menlo,"Cascadia Mono",Consolas,monospace;
}
@media (prefers-color-scheme:dark){
  :root{--paper:#10131a;--card:#171b24;--ink:#e8ebf2;--ink-soft:#c3c9d6;
    --muted:#8a92a6;--line:#252b38;--accent:#6fa8dc;--e1:#5ba3d0;--e2:#e2725b;
    --pos:#4ac585;--neg:#e2725b;--callout:#182234;}
}
:root[data-theme="light"]{--paper:#f3f4f6;--card:#fff;--ink:#161a22;--ink-soft:#3a4152;
  --muted:#697086;--line:#dfe3ea;--accent:#1f5fa8;--e1:#1f77b4;--e2:#c0392b;
  --pos:#1f8a55;--neg:#c0392b;--callout:#eef3fb;}
:root[data-theme="dark"]{--paper:#10131a;--card:#171b24;--ink:#e8ebf2;--ink-soft:#c3c9d6;
  --muted:#8a92a6;--line:#252b38;--accent:#6fa8dc;--e1:#5ba3d0;--e2:#e2725b;
  --pos:#4ac585;--neg:#e2725b;--callout:#182234;}

*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--serif);
  line-height:1.65;-webkit-font-smoothing:antialiased}
article{max-width:760px;margin:0 auto;padding:clamp(1.5rem,4vw,4rem) 1.25rem 5rem}
.hero{border-bottom:1px solid var(--line);padding-bottom:2rem;margin-bottom:2.5rem}
.eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);margin:0 0 1rem}
h1{font-family:var(--sans);font-weight:800;letter-spacing:-.02em;line-height:1.05;
  font-size:clamp(2.1rem,6vw,3.4rem);margin:0 0 1rem;text-wrap:balance;color:var(--ink)}
.dek{font-size:1.18rem;color:var(--ink-soft);margin:0 0 1.75rem;max-width:60ch}
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;
  margin:0;padding:0}
.meta div{border-left:2px solid var(--accent);padding-left:.75rem}
.meta dt{font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted)}
.meta dd{margin:.15rem 0 0;font-family:var(--sans);font-weight:700;font-size:1.15rem;
  font-variant-numeric:tabular-nums}
section{margin:2.75rem 0}
h2{font-family:var(--sans);font-weight:750;font-size:1.5rem;letter-spacing:-.01em;
  margin:0 0 1rem;display:flex;align-items:baseline;gap:.7rem;color:var(--ink)}
h2 .n{font-family:var(--mono);font-size:.85rem;color:var(--accent);
  border:1px solid var(--line);border-radius:50%;width:1.9em;height:1.9em;
  display:inline-flex;align-items:center;justify-content:center;flex:none;font-weight:600}
h3{font-family:var(--sans);font-weight:700;font-size:1.05rem;margin:0 0 .5rem}
section>h3{margin:1.9rem 0 .6rem;font-size:1.15rem;color:var(--accent);
  border-top:1px solid var(--line);padding-top:1.2rem}
p{margin:0 0 1rem}
ul,ol{margin:0 0 1rem;padding-left:1.3rem}li{margin:.35rem 0}
ul.tight li{margin:.2rem 0}
code{font-family:var(--mono);font-size:.86em;background:var(--callout);
  padding:.1em .38em;border-radius:4px;color:var(--ink-soft)}
em{font-style:italic}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.25rem 0}
@media(max-width:560px){.cards{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:1.1rem 1.2rem;border-top:3px solid var(--line)}
.card.e1{border-top-color:var(--e1)}.card.e2{border-top-color:var(--e2)}
.card.e1 h3{color:var(--e1)}.card.e2 h3{color:var(--e2)}
.card p{font-size:.95rem;color:var(--ink-soft);margin:0}
.note{font-size:.9rem;color:var(--muted);border-left:2px solid var(--line);
  padding-left:.9rem;font-style:italic}
details.methods{font-size:.86rem;background:var(--card);border:1px solid var(--line);
  border-radius:8px;padding:.5rem .95rem;margin:1.1rem 0;color:var(--ink-soft)}
details.methods summary{font-family:var(--sans);font-weight:600;cursor:pointer;
  color:var(--accent);font-size:.8rem;letter-spacing:.03em;text-transform:uppercase}
details.methods[open] summary{margin-bottom:.5rem}
details.methods ul{margin:.3rem 0;padding-left:1.2rem}
details.methods li{margin:.25rem 0}
.sig{font-family:var(--mono);font-size:.85em}
.callout{background:var(--callout);border-radius:12px;padding:1.4rem 1.5rem;margin:1.25rem 0}
.callout .big{font-family:var(--sans);font-size:1.3rem;font-weight:700;margin:0 0 .6rem;
  line-height:1.3;color:var(--ink)}
.callout p{margin:0;color:var(--ink-soft)}
.tw{overflow-x:auto;margin:1.25rem 0}
table{border-collapse:collapse;width:100%;font-family:var(--sans);font-size:.9rem;
  font-variant-numeric:tabular-nums}
th,td{text-align:right;padding:.5rem .7rem;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
thead th{font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);font-weight:600;border-bottom:1.5px solid var(--ink-soft)}
tbody tr:hover{background:var(--callout)}
td.pos{color:var(--pos);font-weight:600}td.neg{color:var(--neg);font-weight:600}
td.best{background:color-mix(in srgb,var(--pos) 16%,transparent);font-weight:700}
td.worst{background:color-mix(in srgb,var(--neg) 13%,transparent)}
figure{margin:1.5rem 0 .5rem}
figure img{width:100%;height:auto;border:1px solid var(--line);border-radius:8px;
  background:#fff}
figcaption{font-size:.82rem;color:var(--muted);margin-top:.6rem;font-family:var(--sans);
  text-align:center}
ol.concl li{margin:.6rem 0}
.foot{font-size:.82rem;color:var(--muted);margin-top:2rem;padding-top:1.25rem;
  border-top:1px solid var(--line);font-family:var(--sans)}
</style>
